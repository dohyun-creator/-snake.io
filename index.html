<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake.io Clone (AI Bots Added)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #111424;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .score-board {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #leaderboard {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #leaderboard h3 {
            margin-bottom: 8px;
            color: #ffa502;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        #leaderboard ol {
            padding-left: 20px;
        }
        #leaderboard li {
            margin-bottom: 4px;
        }
        canvas {
            background: #161a2e;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 20, 36, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #game-over-screen.show {
            opacity: 1;
            pointer-events: auto;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #ff4757;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #ced6e0;
        }
        button {
            background: #2ed573;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
            transition: transform 0.2s, background 0.2s;
        }
        button:hover {
            background: #26af5f;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            color: #747d8c;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-board">SCORE: <span id="score">0</span></div>
        <div id="leaderboard">
            <h3>순위표</h3>
            <ol id="leaderboard-list"></ol>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 id="game-title">GAME OVER</h1>
        <p>최종 점수: <span id="final-score">0</span></p>
        <button id="restart-btn">다시 시작</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="instructions">뱀은 멈추지 않습니다! 마우스나 터치 방향으로 계속 전진합니다. 다른 AI 뱀의 몸통에 머리가 부딪히면 아웃입니다!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartBtn = document.getElementById('restart-btn');
        const leaderboardList = document.getElementById('leaderboard-list');

        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.8;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let snakes, foods, mouse, isGameOver, speed;
        const SNAKE_RADIUS = 10;
        const FOOD_COUNT = 60;
        const BOT_COUNT = 5; // 경쟁할 AI 봇
