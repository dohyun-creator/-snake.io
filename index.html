<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake.io Ultimate Ultimate</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0f111a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .score-board {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        /* 퀘스트 창 UI */
        #quest-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 250px;
            pointer-events: auto;
        }
        #quest-panel h3 {
            color: #eccc68;
            margin-bottom: 8px;
            font-size: 1rem;
        }
        .quest-item {
            font-size: 0.85rem;
            margin-bottom: 10px;
            color: #ccc;
        }
        .skin-btn {
            background: #57606f;
            color: white;
            border: none;
            padding: 3px 8px;
            font-size: 0.75rem;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
        }
        .skin-btn.unlocked {
            background: #ffa502;
            font-weight: bold;
        }
        .skin-btn.active {
            background: #2ed573 !important;
        }
        #leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 15px;
            width: 200px;
            z-index: 10;
        }
        #leaderboard h3 { color: #ff7f50; margin-bottom: 5px; font-size: 1rem;}
        #leaderboard ol { padding-left: 20px; font-size: 0.85rem;}
        canvas {
            background: #141824;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 17, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #game-over-screen.show { opacity: 1; pointer-events: auto; }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #ff4757; }
        p { font-size: 1.5rem; margin-bottom: 25px; color: #ced6e0; }
        button.main-btn {
            background: #2ed573; color: white; border: none; padding: 12px 35px;
            font-size: 1.2rem; font-weight: bold; border-radius: 25px; cursor: pointer;
        }
        #instructions { position: absolute; bottom: 15px; color: #747d8c; font-size: 0.85rem; text-align: center;}
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-board">SCORE: <span id="score">0</span></div>
        
        <!-- 퀘스트 및 스킨 변경 패널 -->
        <div id="quest-panel">
            <h3>🎯 업적 및 스킨 잠금해제</h3>
            <div class="quest-item">
                초록 기본 스킨 (상시 오픈)
                <button class="skin-btn active" onclick="changeSkin('#2ed573', 0)">장착</button>
            </div>
            <div class="quest-item">
                🔥 150점 돌파 (네온 핑크)
                <button id="skin-btn-1" class="skin-btn" disabled onclick="changeSkin('#ff4757', 1)">잠김</button>
            </div>
            <div class="quest-item">
                👑 300점 돌파 (골드 황금)
                <button id="skin-btn-2" class="skin-btn" disabled onclick="changeSkin('#eccc68', 2)">잠김</button>
            </div>
        </div>
    </div>

    <div id="leaderboard">
        <h3>🏆 실시간 순위</h3>
        <ol id="leaderboard-list"></ol>
    </div>

    <div id="game-over-screen">
        <h1 id="over-title">GAME OVER</h1>
        <p>최종 점수: <span id="final-score">0</span></p>
        <button id="restart-btn" class="main-btn">다시 도전</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="instructions">뱀은 멈추지 않습니다! 마우스가 있는 방향으로 계속 전진합니다.<br><b>주의:</b> 적의 몸통에 머리가 부딪히면 사망합니다! 반대로 적이 내 몸통에 부딪히게 유도하세요!</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const restartBtn = document.getElementById('restart-btn');
        const leaderboardList = document.getElementById('leaderboard-list');

        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.95;
            canvas.height = window.innerHeight * 0.85;
        }
        resizeCanvas();

        let snakes = [];
        let foods = [];
        let mouse = { x: 0, y: 0 };
        let score = 0;
        let isGameOver = false;
        
        const SNAKE_RADIUS = 10;
        const FOOD_COUNT = 60;
        const BOT_COUNT = 6; 

        // 스킨 정보 시스템 (로컬스토리지에 저장되어 새로고침해도 유지됨)
        let unlockedSkins = JSON.parse(localStorage.getItem('snake_skins')) || [true, false, false];
        let currentSkinColor = localStorage.getItem('snake_current_skin') || '#2ed573';

        const botNames = ["Cobra_AI", "Shadow_Viper", "Hunter_X", "Glitch", "Alpha_Worm", "Toxic_Tail"];
        const botColors = ["#1e90ff", "#ffa502", "#9b59b6", "#10ac84", "#ff9f43", "#00d2d3"];

        function initGame() {
            snakes = [];
            foods = [];
            score = 0;
            isGameOver = false;
            scoreEl.textContent = score;
            gameOverScreen.classList.remove('show');

            // 플레이어 생성
            snakes.push({
                id: 'player',
                name: 'Player (나)',
                body: Array.from({length: 20}, () => ({x: canvas.width/2, y: canvas.height/2})),
                length: 20,
                color: currentSkinColor,
                angle: 0,
                speed: 4,
                isBot: false
            });

            // AI 봇 생성
            for (let i = 0; i < BOT_COUNT; i++) {
                createBot(i);
            }

            // 먹이 생성
            for (let i = 0; i < FOOD_COUNT; i++) {
                foods.push(createFood());
            }

            updateQuestUI();
        }

        function createBot(index) {
            const rx = Math.random() * canvas.width;
            const ry = Math.random() * canvas.height;
            snakes.push({
                id: 'bot_' + Math.random(),
                name: botNames[index % botNames.length],
                body: Array.from({length: 20}, () => ({x: rx, y: ry})),
                length: 20,
                color: botColors[index % botColors.length],
                angle: Math.random() * Math.PI * 2,
                speed: 3.5,
                isBot: true,
                changeDirTimer: 0
            });
        }

        function createFood(x, y, radius, color) {
            const colors = ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#eccc68', '#ff6b81'];
            return {
                x: x || Math.random() * canvas.width,
                y: y || Math.random() * canvas.height,
                radius: radius || Math.random() * 3 + 3,
                color: color || colors[Math.floor(Math.random() * colors.length)]
            };
        }

        // 마우스 및 터치 이벤트 (뱀은 멈추지 않고 마우스 조종 방향으로 항시 전진)
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.touches[0].clientX - rect.left;
                mouse.y = e.touches[0].clientY - rect.top;
            }
        });

        function update() {
            if (isGameOver) return;

            // 1. 모든 뱀(플레이어 및 AI) 이동 로직
            snakes.forEach(snake => {
                const head = snake.body[0];

                if (!snake.isBot) {
                    // 플레이어: 마우스 조종 방향 각도 구하기
                    const dx = mouse.x - head.x;
                    const dy = mouse.y - head.y;
                    if (Math.sqrt(dx*dx + dy*dy) > 5) {
                        snake.angle = Math.atan2(dy, dx);
                    }
                } else {
                    // AI 봇: 불규칙적으로 방향 변경 및 가장 가까운 먹이 추적 시뮬레이션
                    snake.changeDirTimer--;
                    if (snake.changeDirTimer <= 0 || Math.random() < 0.01) {
                        if (foods.length > 0 && Math.random() < 0.7) {
                            // 주변 먹이 추적
                            let closest = foods[0];
                            let minDist = Infinity;
                            foods.forEach(f => {
                                let d = Math.pow(f.x - head.x, 2) + Math.pow(f.y - head.y, 2);
                                if(d < minDist) { minDist = d; closest = f; }
                            });
                            snake.angle = Math.atan2(closest.y - head.y, closest.x - head.x);
                        } else {
                            snake.angle += (Math.random() - 0.5) * 2;
                        }
                        snake.changeDirTimer = Math.random() * 100 + 50;
                    }
                }

                // 무조건 앞으로 전진 (멈추지 않음)
                const nextX = head.x + Math.cos(snake.angle) * snake.speed;
                const nextY = head.y + Math.sin(snake.angle) * snake.speed;

                // 벽 충돌 처리 (벽에 부딪히면 사망)
                if (nextX < 0 || nextX > canvas.width || nextY < 0 || nextY > canvas.height) {
                    snake.isDead = true;
                    return;
                }

                // 몸통 배열 한 칸 앞으로 당기기
                snake.body.unshift({ x: nextX, y: nextY });
                if (snake.body.length > snake.length) {
                    snake.body.pop();
                }
            });

            // 2. 충돌 판정 (★핵심 룰: 머리가 타인의 몸통에 닿으면 사망)
            for (let i = 0; i < snakes.length; i++) {
                let s1 = snakes[i];
                if (s1.isDead) continue;
                let h1 = s1.body[0];

                for (let j = 0; j < snakes.length; j++) {
                    let s2 = snakes[j];
                    if (s2.isDead) continue;

                    // 자기 자신 몸통과의 충돌은 제외 (타인과의 충돌만 판정)
                    if (s1.id !== s2.id) {
                        // s1의 머리가 s2의 몸통 마디들 중 하나에 충돌했는지 체크
                        // 머리 부분(앞의 3마디 정도)은 충돌 판정에서 제외하여 자연스럽게 스쳐 지나갈 수 있게 함
                        for (let k = 3; k < s2.body.length; k += 2) {
                            let part = s2.body[k];
                            let dist = Math.sqrt(Math.pow(h1.x - part.x, 2) + Math.pow(h1.y - part.y, 2));
                            
                            if (dist < SNAKE_RADIUS * 1.6) {
                                s1.isDead = true; // s1 사망!
                                break;
                            }
                        }
                    }
                    if (s1.isDead) break;
                }
            }

            // 3. 사망한 뱀 처리 (먹이로 변환 및 리스폰)
            for (let i = snakes.length - 1; i >= 0; i--) {
                let s = snakes[i];
                if (s.isDead) {
                    // 죽은 자리에 몸통 크기만큼 먹이 뿌리기!
                    s.body.forEach((part, idx) => {
                        if (idx % 3 === 0) {
                            foods.push(createFood(part.x + (Math.random()-0.5)*10, part.y + (Math.random()-0.5)*10, 5, s.color));
                        }
                    });

                    if (!s.isBot) {
                        isGameOver = true;
                        finalScoreEl.textContent = score;
                        checkQuestUnlock(); // 게임 오버 시 퀘스트 달성 체크
                        gameOverScreen.classList.add('show');
                    } else {
                        // AI는 죽으면 즉시 제거하고 다른 곳에 새로 리스폰시킴
                        snakes.splice(i, 1);
                        setTimeout(() => { if(!isGameOver) createBot(Math.floor(Math.random()*10)); }, 1000);
                    }
                }
            }

            // 4. 먹이 섭취 처리
            snakes.forEach(snake => {
                if (snake.isDead) return;
                let head = snake.body[0];

                for (let i = foods.length - 1; i >= 0; i--) {
                    let food = foods[i];
                    let dist = Math.sqrt(Math.pow(head.x - food.x, 2) + Math.pow(head.y - food.y, 2));

                    if (dist < SNAKE_RADIUS + food.radius) {
                        snake.length += 2;
                        if (!snake.isBot) {
                            score += Math.floor(food.radius);
                            scoreEl.textContent = score;
                            snake.speed = Math.min(6, 4 + (score / 300)); // 점수가 늘어날수록 전진 이동 속도 상승
                            checkQuestUnlock(); // 실시간 점수 도달 시 퀘스트 체크
                        }
                        foods.splice(i, 1);
                        foods.push(createFood()); // 먹이 상시 유지
                    }
                }
            });

            // 실시간 순위표 업데이트
            updateLeaderboard();
        }

        function render() {
            ctx.fillStyle = '#141824';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 격자 배경 효과
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // 먹이 그리기
            foods.forEach(food => {
                ctx.beginPath();
                ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
                ctx.fillStyle = food.color;
                ctx.fill();
            });

            // 모든 뱀 렌더링
            snakes.forEach(snake => {
                for (let i = snake.body.length - 1; i >= 0; i--) {
                    if (i % 2 === 0 || i === 0) {
                        let part = snake.body[i];
                        ctx.beginPath();
                        let r = i === 0 ? SNAKE_RADIUS : SNAKE_RADIUS * 0.85;
                        ctx.arc(part.x, part.y, r, 0, Math.PI * 2);
                        ctx.fillStyle = i === 0 ? '#ffffff' : snake.color;
                        ctx.fill();
                        ctx.closePath();

                        // 머리에 방향 눈 그리기
                        if (i === 0) {
                            ctx.fillStyle = '#000';
                            ctx.beginPath();
                            ctx.arc(part.x + Math.cos(snake.angle+0.4)*5, part.y + Math.sin(snake.angle+0.4)*5, 2, 0, Math.PI*2);
                            ctx.arc(part.x + Math.cos(snake.angle-0.4)*5, part.y + Math.sin(snake.angle-0.4)*5, 2, 0, Math.PI*2);
                            ctx.fill();
                        }
                    }
                }
            });
        }

        function updateLeaderboard() {
            let sorted = [...snakes].sort((a,b) => b.length - a.length);
            leaderboardList.innerHTML = '';
            sorted.slice(0, 5).forEach((s, idx) => {
                let li = document.createElement('li');
                li.style.color = s.color;
                li.innerHTML = `<b>${idx+1}. ${s.name}</b> (${s.length * 10})`;
                leaderboardList.appendChild(li);
            });
        }

        // 퀘스트 조건 체크 및 잠금 해제 시스템
        function checkQuestUnlock() {
            if (score >= 150 && !unlockedSkins[1]) {
                unlockedSkins[1] = true;
                saveSkins();
            }
            if (score >= 300 && !unlockedSkins[2]) {
                unlockedSkins[2] = true;
                saveSkins();
            }
            updateQuestUI();
        }

        function saveSkins() {
            localStorage.setItem('snake_skins', JSON.stringify(unlockedSkins));
        }

        function updateQuestUI() {
            for (let i = 1; i <= 2; i++) {
                let btn = document.getElementById(`skin-btn-${i}`);
                if (unlockedSkins[i]) {
                    btn.disabled = false;
                    btn.classList.add('unlocked');
                    if (currentSkinColor === (i === 1 ? '#ff4757' : '#eccc68')) {
                        btn.textContent = "장착됨";
                        btn.classList.add('active');
                    } else {
                        btn.textContent = "장착";
                        btn.classList.remove('active');
                    }
                } else {
                    btn.disabled = true;
                    btn.textContent = "잠김";
                }
            }
        }

        // 스킨 실시간 적용 변경 함수
        window.changeSkin = function(color, index) {
            if (!unlockedSkins[index]) return;
            currentSkinColor = color;
            localStorage.setItem('snake_current_skin', color);
            
            // 현재 플레이 중인 뱀 색깔 즉시 교체
            let player = snakes.find(s => !s.isBot);
            if (player) player.color = color;

            // UI 버튼 스타일 갱신
            const btns = document.querySelectorAll('.skin-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateQuestUI();
        };

        restartBtn.addEventListener('click', initGame);

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>
